services:
    web:
        image: nginx:1.13.12
        volumes:
            - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
        volumes_from:
            - wpfpm
        ports:
            - ${WP_PORT:-8080}:80
        logging:
            driver: "json-file"
            options:
                max-size: "256m"
                max-file: "1"

    wpfpm:
        image: wordpress:6.9-php8.4-fpm
        env_file:
            - .env
        environment:
            - WORDPRESS_DB_HOST=mysql
            - WORDPRESS_DB_USER=root
            - WORDPRESS_DB_PASSWORD=examplepass
            - WORDPRESS_DB_NAME=exampledb
            - MYSQL_ROOT_PASSWORD=examplepass
        volumes:
            - /tmp:/tmp
            - ./shared:/shared
        depends_on:
            - mysql
        logging:
            driver: "json-file"
            options:
               max-size: "256m"
               max-file: "1"
        privileged: true
        command: sh -c "[ -f /shared/*.deb ] && dpkg -i /shared/*.deb; docker-entrypoint.sh php-fpm"

    mysql:
        image: mysql:5.7
        environment:
            - MYSQL_DATABASE=exampledb
#            - MYSQL_USER=root
#            - MYSQL_PASSWORD=examplepass
            - MYSQL_ROOT_PASSWORD=examplepass
        logging:
            driver: "json-file"
            options:
               max-size: "256m"
               max-file: "1"

    wpcli:
        image: wordpress:cli-php8.4
        depends_on:
            - wpfpm
        volumes:
            - ./wordpress/:/opt/wordpress:ro
            - /tmp:/tmp
        volumes_from:
            - wpfpm
        environment:
            - WP_URL=${WP_URL:?"WP_URL env variable is required (http://hostmachineip)"}:${WP_PORT:-8080}
            - WP_TITLE=${WP_TITLE:-WordpressShop}
            - WP_USERNAME=${WP_USERNAME:-labuser}
            - WP_PASSWORD=${WP_PASSWORD:-labpass}
            - WP_EMAIL=${WP_EMAIL:-mail@test.test}
            - WORDPRESS_DB_HOST=mysql
            - WORDPRESS_DB_USER=root
            - WORDPRESS_DB_PASSWORD=examplepass
            - WORDPRESS_DB_NAME=exampledb
            - MYSQL_ROOT_PASSWORD=examplepass
        user: root
        command: ["sh", "/opt/wordpress/setup.sh"]
        logging:
            driver: "json-file"
            options:
               max-size: "256m"
               max-file: "1"
